<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>YK Live Meet</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>

body{
background:#0f172a;
}

video{
width:100%;
border-radius:10px;
}

</style>

</head>

<body class="text-white">

<!-- HEADER -->

<header class="flex justify-between items-center p-4 border-b border-slate-700">

<h1 class="text-xl font-bold">
🎥 YK Live Meeting
</h1>

<a href="#help" class="text-blue-400 text-sm">
Help
</a>

</header>


<div class="max-w-7xl mx-auto p-4">

<!-- MEETING PANEL -->

<div class="bg-slate-800 p-6 rounded-xl">

<h2 class="text-lg mb-4">
Start or Join Meeting
</h2>

<div class="flex flex-wrap gap-3">

<input
id="roomID"
placeholder="Meeting ID"
class="p-3 rounded bg-slate-900 border border-slate-600 flex-1"
/>

<button onclick="generateMeetingID()"
class="bg-purple-600 px-4 py-2 rounded">
Generate ID
</button>

<button onclick="createMeeting()"
class="bg-green-600 px-4 py-2 rounded">
Start
</button>

<button onclick="joinMeeting()"
class="bg-blue-600 px-4 py-2 rounded">
Join
</button>

<button onclick="copyLink()"
class="bg-indigo-600 px-4 py-2 rounded">
Share Link
</button>

</div>

</div>


<!-- VIDEO GRID -->

<div
id="videoGrid"
class="grid md:grid-cols-2 lg:grid-cols-3 gap-4 mt-6">
</div>


<!-- CONTROLS -->

<div class="flex flex-wrap gap-3 mt-6">

<button onclick="toggleMic()" class="bg-yellow-500 text-black px-4 py-2 rounded">
Mic
</button>

<button onclick="toggleCam()" class="bg-purple-600 px-4 py-2 rounded">
Camera
</button>

<button onclick="shareScreen()" class="bg-blue-600 px-4 py-2 rounded">
Screen Share
</button>

<button onclick="leaveMeeting()" class="bg-red-600 px-4 py-2 rounded">
Leave
</button>

</div>


<!-- CHAT -->

<div class="bg-slate-800 mt-6 p-4 rounded-xl">

<h3 class="mb-2">
💬 Live Chat
</h3>

<div
id="chatBox"
class="bg-slate-900 h-40 overflow-y-auto p-2 rounded text-sm">
</div>

<div class="flex gap-2 mt-2">

<input
id="chatInput"
placeholder="Type message"
class="flex-1 p-2 bg-slate-900 border border-slate-600 rounded"
/>

<button onclick="sendChat()"
class="bg-indigo-600 px-4 py-2 rounded">
Send
</button>

</div>

</div>


<!-- HELP -->

<section id="help" class="mt-10 bg-slate-800 p-6 rounded-xl">

<h2 class="text-xl font-bold mb-4">
Help
</h2>

<p class="text-gray-300 mb-2">
1. Click Generate ID to create meeting ID.
</p>

<p class="text-gray-300 mb-2">
2. Host clicks Start Meeting.
</p>

<p class="text-gray-300 mb-2">
3. Share meeting link with others.
</p>

<p class="text-gray-300 mb-2">
4. Participants join using same ID.
</p>

<p class="text-gray-300 mb-2">
5. Use camera, mic and screen share controls.
</p>

</section>

</div>



<script>

let peer
let stream
let room

// AUTO MEETING ID

function generateMeetingID(){

let id=Math.random().toString(36).substring(2,8)

document.getElementById("roomID").value=id

}


// CAMERA START

async function startMedia(){

stream=await navigator.mediaDevices.getUserMedia({
video:true,
audio:true
})

addVideo(stream,true)

}


function addVideo(stream,muted=false){

let video=document.createElement("video")

video.srcObject=stream
video.autoplay=true
video.playsInline=true
video.muted=muted

document.getElementById("videoGrid").appendChild(video)

}


// CREATE MEETING

async function createMeeting(){

room=document.getElementById("roomID").value

await startMedia()

peer=new Peer(room)

peer.on("call",call=>{

call.answer(stream)

call.on("stream",remote=>{
addVideo(remote)
})

})

alert("Meeting Started")

}


// JOIN MEETING

async function joinMeeting(){

room=document.getElementById("roomID").value

await startMedia()

peer=new Peer()

peer.on("open",id=>{

let call=peer.call(room,stream)

call.on("stream",remote=>{
addVideo(remote)
})

})

}


// MIC

function toggleMic(){

let track=stream.getAudioTracks()[0]

track.enabled=!track.enabled

}


// CAMERA

function toggleCam(){

let track=stream.getVideoTracks()[0]

track.enabled=!track.enabled

}


// SCREEN SHARE

async function shareScreen(){

let screen=await navigator.mediaDevices.getDisplayMedia({
video:true
})

addVideo(screen)

}


// LEAVE

function leaveMeeting(){

location.reload()

}


// COPY LINK

function copyLink(){

let id=document.getElementById("roomID").value

let link=location.href+"?room="+id

navigator.clipboard.writeText(link)

alert("Meeting link copied")

}


// CHAT

function sendChat(){

let msg=document.getElementById("chatInput").value

let box=document.getElementById("chatBox")

box.innerHTML+=`<div>👤 ${msg}</div>`

box.scrollTop=box.scrollHeight

document.getElementById("chatInput").value=""

}


// AUTO ROOM FROM LINK

const params=new URLSearchParams(window.location.search)

const roomParam=params.get("room")

if(roomParam){

document.getElementById("roomID").value=roomParam

}

</script>

</body>
</html>
