<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>YK Meet</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>

body{
background:#0f172a;
}

video{
width:100%;
border-radius:12px;
}

</style>

</head>

<body class="text-white">

<!-- HEADER -->

<header class="flex justify-between items-center p-4 border-b border-slate-700">

<h1 class="text-xl font-bold">
🎥 YK Meet
</h1>

<button onclick="toggleParticipants()" class="text-sm bg-slate-700 px-3 py-1 rounded">
Participants
</button>

</header>


<div class="flex">

<!-- VIDEO AREA -->

<div class="flex-1 p-4">

<!-- MEETING PANEL -->

<div class="bg-slate-800 p-4 rounded-xl mb-4">

<div class="flex flex-wrap gap-3">

<input id="roomID"
placeholder="Meeting ID"
class="p-3 bg-slate-900 border border-slate-600 rounded flex-1"/>

<button onclick="generateMeetingID()"
class="bg-purple-600 px-4 py-2 rounded">
Generate
</button>

<button onclick="startMeeting()"
class="bg-green-600 px-4 py-2 rounded">
Start
</button>

<button onclick="joinMeeting()"
class="bg-blue-600 px-4 py-2 rounded">
Join
</button>

<button onclick="copyLink()"
class="bg-indigo-600 px-4 py-2 rounded">
Share
</button>

</div>

</div>


<!-- VIDEO GRID -->

<div id="videoGrid"
class="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
</div>

</div>


<!-- SIDEBAR -->

<div id="sidebar"
class="w-72 bg-slate-800 border-l border-slate-700 p-4 hidden md:block">

<h3 class="font-bold mb-3">
Participants
</h3>

<ul id="participantList" class="text-sm space-y-2">

<li>Host</li>

</ul>


<hr class="my-4 border-slate-700">


<h3 class="font-bold mb-2">
Chat
</h3>

<div id="chatBox"
class="bg-slate-900 h-40 overflow-y-auto p-2 rounded text-sm">
</div>

<div class="flex gap-2 mt-2">

<input id="chatInput"
class="flex-1 p-2 bg-slate-900 border border-slate-600 rounded"
placeholder="Message"/>

<button onclick="sendChat()"
class="bg-indigo-600 px-3 py-2 rounded">
Send
</button>

</div>

</div>

</div>


<!-- FLOATING CONTROLS -->

<div
class="fixed bottom-6 left-1/2 -translate-x-1/2 flex gap-3 bg-slate-800 p-3 rounded-xl shadow-lg">

<button onclick="toggleMic()" class="bg-yellow-500 text-black px-4 py-2 rounded">
Mic
</button>

<button onclick="toggleCam()" class="bg-purple-600 px-4 py-2 rounded">
Camera
</button>

<button onclick="shareScreen()" class="bg-blue-600 px-4 py-2 rounded">
Share Screen
</button>

<button onclick="raiseHand()" class="bg-orange-500 px-4 py-2 rounded">
✋
</button>

<button onclick="leaveMeeting()" class="bg-red-600 px-4 py-2 rounded">
Leave
</button>

</div>



<script>

let peer
let stream
let room

// GENERATE MEETING ID

function generateMeetingID(){

let id=Math.random().toString(36).substring(2,9)

document.getElementById("roomID").value=id

}


// MEDIA

async function startMedia(){

stream=await navigator.mediaDevices.getUserMedia({
video:true,
audio:true
})

addVideo(stream,true)

}

function addVideo(stream,muted=false){

let video=document.createElement("video")

video.srcObject=stream
video.autoplay=true
video.playsInline=true
video.muted=muted

document.getElementById("videoGrid").appendChild(video)

}


// START MEETING

async function startMeeting(){

room=document.getElementById("roomID").value

await startMedia()

peer=new Peer(room)

peer.on("call",call=>{

call.answer(stream)

call.on("stream",remote=>{
addVideo(remote)
})

})

}


// JOIN MEETING

async function joinMeeting(){

room=document.getElementById("roomID").value

await startMedia()

peer=new Peer()

peer.on("open",id=>{

let call=peer.call(room,stream)

call.on("stream",remote=>{
addVideo(remote)
})

})

}


// MIC

function toggleMic(){

let track=stream.getAudioTracks()[0]

track.enabled=!track.enabled

}


// CAMERA

function toggleCam(){

let track=stream.getVideoTracks()[0]

track.enabled=!track.enabled

}


// SCREEN SHARE

async function shareScreen(){

let screen=await navigator.mediaDevices.getDisplayMedia({
video:true
})

addVideo(screen)

}


// CHAT

function sendChat(){

let msg=document.getElementById("chatInput").value

let box=document.getElementById("chatBox")

box.innerHTML+=`<div>👤 ${msg}</div>`

box.scrollTop=box.scrollHeight

document.getElementById("chatInput").value=""

}


// RAISE HAND

function raiseHand(){

let box=document.getElementById("chatBox")

box.innerHTML+=`<div class="text-yellow-400">✋ Someone raised hand</div>`

}


// PARTICIPANT SIDEBAR

function toggleParticipants(){

let bar=document.getElementById("sidebar")

bar.classList.toggle("hidden")

}


// COPY LINK

function copyLink(){

let id=document.getElementById("roomID").value

let link=location.href+"?room="+id

navigator.clipboard.writeText(link)

alert("Meeting link copied")

}


// LEAVE

function leaveMeeting(){

location.reload()

}


// AUTO ROOM FROM LINK

const params=new URLSearchParams(window.location.search)

const roomParam=params.get("room")

if(roomParam){

document.getElementById("roomID").value=roomParam

}

</script>

</body>
</html>
