```html
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YK Official Video Player</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#000;
}

video::-webkit-media-controls{
display:none !important;
}

.controls{
transition:0.3s;
}

.hide{
opacity:0;
}

</style>

</head>


<body class="flex items-center justify-center min-h-screen p-6">


<div class="w-full max-w-5xl">


<!-- PLAYER -->

<div id="playerBox" class="hidden relative rounded-xl overflow-hidden bg-black shadow-2xl">

<!-- CLOSE -->

<button onclick="closeVideo()"
class="absolute top-3 right-3 z-50 bg-black/70 px-3 py-1 rounded text-white text-lg">

✕

</button>


<video id="video" class="w-full h-[65vh] bg-black"></video>


<!-- CONTROLS -->

<div id="controls"
class="absolute bottom-0 w-full bg-gradient-to-t from-black/90 p-3 space-y-2">


<input id="progress" type="range" value="0" class="w-full">


<div class="flex items-center gap-3 flex-wrap text-white text-sm">

<button id="play" class="px-3 py-1 bg-gray-800 rounded">▶</button>

<button id="back" class="px-3 py-1 bg-gray-800 rounded">
⏪ 10s
</button>

<button id="forward" class="px-3 py-1 bg-gray-800 rounded">
10s ⏩
</button>


<input id="volume" type="range"
min="0" max="1" step="0.01" value="1">


<select id="speed" class="bg-black border px-2 py-1">
<option value="0.5">0.5x</option>
<option value="1" selected>1x</option>
<option value="1.5">1.5x</option>
<option value="2">2x</option>
</select>


<button id="fullscreen"
class="px-3 py-1 bg-gray-800 rounded">

⛶

</button>

</div>

</div>

</div>



<!-- UPLOAD UI -->

<div id="uploadUI"
class="border-2 border-dashed border-gray-600 rounded-xl p-16 text-center bg-gray-900">

<div class="text-6xl mb-4">🎬</div>

<h2 class="text-white text-2xl mb-3">
Select Video
</h2>

<label
class="cursor-pointer bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded">

Upload Video

<input type="file"
id="file"
accept="video/*"
class="hidden">

</label>

</div>

</div>



<script>

const video=document.getElementById("video")
const file=document.getElementById("file")
const uploadUI=document.getElementById("uploadUI")
const playerBox=document.getElementById("playerBox")

const play=document.getElementById("play")
const back=document.getElementById("back")
const forward=document.getElementById("forward")
const progress=document.getElementById("progress")
const volume=document.getElementById("volume")
const speed=document.getElementById("speed")
const fullscreen=document.getElementById("fullscreen")



file.addEventListener("change",function(){

const v=this.files[0]

if(v){

video.src=URL.createObjectURL(v)

uploadUI.style.display="none"
playerBox.style.display="block"

video.play()

}

})



play.onclick=function(){

if(video.paused){

video.play()
play.innerHTML="⏸"

}else{

video.pause()
play.innerHTML="▶"

}

}



back.onclick=function(){

video.currentTime-=10

}



forward.onclick=function(){

video.currentTime+=10

}



video.ontimeupdate=function(){

progress.value=(video.currentTime/video.duration)*100

}



progress.oninput=function(){

video.currentTime=(progress.value/100)*video.duration

}



volume.oninput=function(){

video.volume=this.value

}



speed.onchange=function(){

video.playbackRate=this.value

}



fullscreen.onclick=function(){

if(!document.fullscreenElement){

playerBox.requestFullscreen()

}else{

document.exitFullscreen()

}

}



/* CHANGE FULLSCREEN ICON */

document.addEventListener("fullscreenchange",()=>{

if(document.fullscreenElement){

fullscreen.innerHTML="🡽 Exit"

}else{

fullscreen.innerHTML="⛶"

}

})



function closeVideo(){

video.pause()
video.src=""

playerBox.style.display="none"
uploadUI.style.display="block"

}



document.addEventListener("keydown",function(e){

if(e.code==="Space"){

e.preventDefault()

play.click()

}

if(e.key==="ArrowRight"){

video.currentTime+=10

}

if(e.key==="ArrowLeft"){

video.currentTime-=10

}

})

</script>

</body>
</html>
